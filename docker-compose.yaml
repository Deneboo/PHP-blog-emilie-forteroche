services:
  php:
    build: .
    volumes:
      - .:/var/www/html
      - ./php/conf.d/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    restart: unless-stopped

  web:
    image: nginx:latest
    ports:
      - "8889:80"
    volumes:
      - .:/var/www/html:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog_forteroche
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      
# Permet de créer un volume nommé db_data pour stocker les données de la base de données MySQL. Cela garantit que les données persistent même si le conteneur est recréé ou supprimé.
volumes:
  db_data: